<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Global Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="/style.css">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/globe.gl"></script>
</head>

<body>

<div class="sidebar">
  <h2>🌍 Global Intel</h2>

  <button onclick="toggleView()">2D / 3D</button>
  <button onclick="loadNews()">Latest News</button>
  <button onclick="loadStock()">Markets</button>
</div>

<div id="map"></div>
<div id="globe"></div>

<div id="info">Click any city marker</div>

<!-- Replace your current bottom livebar section in index.html with this -->

<div class="livebar">

  <!-- BBC News -->
  <iframe
    src="https://www.youtube.com/embed/9Auq9mYxFEE?autoplay=1&mute=1"
    allowfullscreen>
  </iframe>

  <!-- Al Jazeera -->
  <iframe
    src="https://www.youtube.com/embed/bNyUyrR0PHo?autoplay=1&mute=1"
    allowfullscreen>
  </iframe>

  <!-- DW News -->
  <iframe
    src="https://www.youtube.com/embed/NQjabLGdP5g?autoplay=1&mute=1"
    allowfullscreen>
  </iframe>

  <!-- France 24 -->
  <iframe
    src="https://www.youtube.com/embed/l8PMl7tUDIE?autoplay=1&mute=1"
    allowfullscreen>
  </iframe>

  <!-- Sky News -->
  <iframe
    src="https://www.youtube.com/embed/9u4M4Whx8gM?autoplay=1&mute=1"
    allowfullscreen>
  </iframe>

  <!-- NDTV India -->
  <iframe
    src="https://www.youtube.com/embed/WB-y7_ymPJ4?autoplay=1&mute=1"
    allowfullscreen>
  </iframe>

</div>

<script src="/script.js"></script>
</body>
</html>
